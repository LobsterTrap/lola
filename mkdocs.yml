---
site_name: Lola - AI Context Package Manager
site_description: Write Agent Skills and Contexts once, use everywhere
site_author: Red Hat
site_url: https://lobstertrap.org/lola/

repo_name: lobstertrap/lola
repo_url: https://github.com/lobstertrap/lola
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: slate
      toggle:
        icon: material/lightbulb-outline
        name: Switch to light mode
    - scheme: default
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode

plugins:
  - search
  - mermaid2:
      arguments:
        theme: base
  - panzoom
  - awesome-pages

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid

extra_css:
  - stylesheets/extra.css

copyright: Copyright &copy; 2026 Lola Contributors
